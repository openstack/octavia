---
fixes:
  - |
    Fixed an issue where amphora certificates generated by the local
    certificate generator were missing the Subject Key Identifier (SKI)
    and Authority Key Identifier (AKI) X.509 extensions. This caused TLS
    handshake failures when using Python 3.13+ or OpenSSL with strict
    X.509 verification enabled, as these environments now enforce RFC 5280
    compliance by default.
upgrade:
  - |
    Existing amphorae with certificates missing the SKI and AKI extensions
    will need certificate rotation (handled by octavia-housekeeping) or
    failover to obtain new compliant certificates.
